    // Initialize Leaflet Map
    function initMap(mapId, coordinates, centroid, zoom = 15) {
      const container = document.getElementById(mapId);
      // Clean previous map if exists
      if (mapId === 'gate-map' && gateMapInstance) {
        gateMapInstance.remove();
        gateMapInstance = null;
      }
      if (mapId === 'report-map' && reportMapInstance) {
        reportMapInstance.remove();
        reportMapInstance = null;
      }

      const map = L.map(mapId).setView([centroid.lat, centroid.lng], zoom);
      
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap contributors'
      }).addTo(map);

      // Map polygon points
      const polygonCoords = coordinates.map(c => [c.lat, c.lng]);
      const polygon = L.polygon(polygonCoords, {
        color: '#3b82f6',
        fillColor: '#3b82f6',
        fillOpacity: 0.25,
        weight: 3
      }).addTo(map);

      // Centroid marker
      L.marker([centroid.lat, centroid.lng]).addTo(map)
        .bindPopup(`Centroid: ${centroid.lat.toFixed(5)}, ${centroid.lng.toFixed(5)}`);

      // Fit map to polygon bounds
      map.fitBounds(polygon.getBounds(), { padding: [20, 20] });

      if (mapId === 'gate-map') gateMapInstance = map;
      if (mapId === 'report-map') reportMapInstance = map;
      return map;
    }
