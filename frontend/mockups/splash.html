<!DOCTYPE html>

<html class="light" lang="en"><head>

                    "inverse-on-surface": "#f1f0f4",
                    "surface-container-low": "#f4f3f7",
                    "secondary-fixed": "#7df6e6",

<style>
        body {
            background-color: #faf9fd; /* surface */
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Subtle pulsating effect for the logo */
        @keyframes subtle-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.95; }
        }
        .animate-logo-pulse {
            animation: subtle-pulse 4s ease-in-out infinite;
        }

        /* Progress bar animation */
        @keyframes progress-load {
            0% { width: 0%; }
            20% { width: 10%; }
            50% { width: 45%; }
            80% { width: 85%; }
            100% { width: 100%; }
        }
        .animate-progress {
            animation: progress-load 3s ease-out forwards;
        }

        /* Geo-grid pattern overlay */
        .geo-grid {
            background-image: 
                linear-gradient(rgba(0, 88, 189, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 88, 189, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Dot pattern overlay */
        .dot-overlay {
            background-image: radial-gradient(rgba(0, 88, 189, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface relative font-body-md text-on-surface">
<!-- Background Layers -->
<div class="absolute inset-0 geo-grid opacity-100"></div>
<div class="absolute inset-0 dot-overlay opacity-50"></div>
<!-- Faint Map Overlay Container -->
<div class="absolute inset-0 opacity-[0.04] pointer-events-none overflow-hidden flex items-center justify-center">
<!-- Abstract geospatial shapes representing high-tech intelligence -->
<svg class="w-[150%] h-[150%] text-primary fill-current" viewbox="0 0 800 800">
<path d="M100 100h100v100H100zM300 250h150v50H300zM50 400h200v20h-200zM600 150h50v300h-50z"></path>
<circle cx="400" cy="400" fill="none" r="300" stroke="currentColor" stroke-width="0.5"></circle>
<circle cx="400" cy="400" fill="none" r="200" stroke="currentColor" stroke-width="0.5"></circle>
<line stroke="currentColor" stroke-width="0.5" x1="0" x2="800" y1="400" y2="400"></line>
<line stroke="currentColor" stroke-width="0.5" x1="400" x2="400" y1="0" y2="800"></line>
</svg>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center justify-between h-full w-full max-w-md px-container-margin py-24">
<!-- Spacer for centering -->
<div class="flex-grow flex items-center justify-center">
<div class="flex flex-col items-center animate-logo-pulse">
<!-- Brand Icon -->
<div class="w-24 h-24 bg-primary rounded-[24px] flex items-center justify-center shadow-lg shadow-primary/20 mb-6">
<span class="material-symbols-outlined text-[48px] text-on-primary" data-icon="language" style="font-variation-settings: 'FILL' 1;">language</span>
</div>
<!-- Brand Wordmark -->
<div class="text-center">
<h1 class="font-display-lg text-display-lg font-bold text-primary tracking-tight">LandIQ</h1>
<p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-[0.2em] mt-1 opacity-70">Integrated Intelligence</p>
</div>
</div>
</div>
<!-- Footer: Progress & Loading -->
<div class="w-full max-w-[200px] flex flex-col items-center gap-4">
<!-- Progress Bar Track -->
<div class="w-full h-[3px] bg-surface-container-highest rounded-full overflow-hidden">
<!-- Progress Bar Fill -->
<div class="h-full bg-primary animate-progress rounded-full"></div>
</div>
<!-- Loading Text -->
<div class="flex items-center gap-2">
<span class="font-label-sm text-label-sm text-outline uppercase tracking-wider">Analyzing Geospatial Data</span>
<span class="flex gap-1">
<span class="w-1 h-1 bg-primary rounded-full animate-bounce [animation-delay:-0.3s]"></span>
<span class="w-1 h-1 bg-primary rounded-full animate-bounce [animation-delay:-0.15s]"></span>
<span class="w-1 h-1 bg-primary rounded-full animate-bounce"></span>
</span>
</div>
</div>
</main>
<!-- Micro-interaction Script -->
<script>
        // Smoothly fade in content on load
        document.addEventListener('DOMContentLoaded', () => {
            const main = document.querySelector('main');
            main.style.opacity = '0';
            main.style.transition = 'opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1)';
            
            requestAnimationFrame(() => {
                main.style.opacity = '1';
            });
        });

        // Interactive background: Faintly move map overlay with gyroscope if available
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (event) => {
                const overlay = document.querySelector('.geo-grid');
                if (overlay) {
                    const x = event.beta / 45; // -2 to 2
                    const y = event.gamma / 45; // -2 to 2
                    overlay.style.transform = `translate(${y * 10}px, ${x * 10}px)`;
                    overlay.style.transition = 'transform 0.2s ease-out';
                }
            });
        }
    </script>
</body></html>
