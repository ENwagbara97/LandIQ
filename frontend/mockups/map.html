<!DOCTYPE html><html class="light" lang="en" style=""><head>

<title>LandIQ Map View</title>

                        "inverse-surface": "#2f3033",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#e9e7eb",
                        "outline": "#727785",
                        "on-primary-container": "#fefcff",
                        "on-secondary-fixed-variant": "#005049",
                        "on-error": "#ffffff",
                        "primary": "#0058bd",
                        "on-tertiary-container": "#fefcff",
                        "surface-container-highest": "#e3e2e6",
                        "primary-fixed": "#d8e2ff",

                        "element-gap-sm": "8px",

                        "sheet-top-padding": "24px",
                        "element-gap-md": "16px",
                        "gutter": "12px"
                    },
                    "fontFamily": {
                        "display-lg": ["DM Sans"],
                        "label-sm": ["DM Sans"],

                    "fontSize": {

                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "title-lg": ["18px", {"lineHeight": "24px", "fontWeight": "500"}],
                        "headline-md": ["22px", {"lineHeight": "28px", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background font-body-md text-on-surface select-none overflow-hidden h-screen w-screen">
<!-- Full Screen Satellite Map Background -->
<div class="fixed inset-0 z-0">

<!-- Subtle Map Overlays (Markers) -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
<div class="relative flex items-center justify-center">
<div class="absolute w-12 h-12 bg-primary/20 rounded-full animate-ping"></div>
<div class="relative w-6 h-6 bg-primary rounded-full border-2 border-white shadow-lg flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-white" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
</div>
</div>
</div>
<!-- Floating Top Bar Area -->
<div class="fixed top-0 left-0 w-full z-40 px-container-margin pt-4 space-y-4">
<!-- Search Bar -->
<div class="flex items-center bg-surface h-14 rounded-full px-4 ambient-shadow border border-outline-variant/30">
<span class="font-display-lg text-primary font-bold pr-4 border-r border-outline-variant mr-4">LandIQ</span>
<div class="flex-1 flex items-center text-on-surface-variant">
<span class="material-symbols-outlined mr-2">search</span>
<span class="font-body-md">Search parcels, coordinates...</span>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden border border-outline-variant">
<img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCnLSPI0QglMZl4BXH1yOEdMaH8p-dyDQMAjGLxZEzwmsybQR0REEu7_OKc777wigGVDpTEygJV6D8PrfucJVIAotWm6zxO4tva4C_A_UyjKehZO5Siz0JVg3ZtVDwjoW3s_z4D4Y8MZbkN5Id6KcWuMoaZ5eHM9CV_5wkxaoMsgFIx1CpXnAYhtOpSISo7E4NhH96ktDhAgA7i7rOppriUo7pqnp-MO5l53S_gLl1Q_gQBeFfLBMLcjG7kfvWFmju2CrSvawoC8iEL">
</div>
</div>
<!-- Pill Category Chips -->
<div class="flex gap-2 overflow-x-auto hide-scrollbar pb-2">
<button class="flex items-center gap-2 px-4 py-2 bg-surface rounded-full border border-outline-variant/50 ambient-shadow whitespace-nowrap active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary text-[20px]">history</span>
<span class="font-label-md">Recent</span>
</button>
<button class="flex items-center gap-2 px-4 py-2 bg-surface rounded-full border border-outline-variant/50 ambient-shadow whitespace-nowrap active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary text-[20px]">bookmark</span>
<span class="font-label-md">Saved</span>
</button>
<button class="flex items-center gap-2 px-4 py-2 bg-surface rounded-full border border-outline-variant/50 ambient-shadow whitespace-nowrap active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary text-[20px]">analytics</span>
<span class="font-label-md">Analysis</span>
</button>
<button class="flex items-center gap-2 px-4 py-2 bg-surface rounded-full border border-outline-variant/50 ambient-shadow whitespace-nowrap active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary text-[20px]">layers</span>
<span class="font-label-md">Overlays</span>
</button>
</div>
</div>
<!-- Floating Primary Action Button -->
<button class="fixed right-container-margin bottom-[180px] z-40 bg-inverse-surface text-on-primary-container px-6 h-14 rounded-2xl flex items-center gap-3 ambient-shadow active:scale-95 transition-transform">
<span class="material-symbols-outlined text-secondary-fixed">query_stats</span>
<span class="font-title-lg font-bold tracking-tight">Analyse</span>
</button>
<!-- Bottom Sheet -->
<div class="fixed bottom-0 left-0 w-full z-40 px-4 md:px-0" id="bottomSheet">
<div class="bg-surface w-full md:max-w-xl mx-auto rounded-t-[28px] ambient-shadow border-x border-t border-outline-variant/20 bottom-sheet-transition transform translate-y-0">
<!-- Drag Handle -->
<div class="w-full flex justify-center pt-3 pb-2">
<div class="w-10 h-1 rounded-full bg-outline-variant"></div>
</div>
<div class="px-container-margin pb-10">
<!-- Header Info -->
<div class="flex justify-between items-start mb-6">
<div>
<h2 class="font-display-lg text-on-surface mb-1">Uyo</h2>
<p class="text-on-surface-variant font-body-md flex items-center">
<span class="material-symbols-outlined text-sm mr-1">near_me</span> Akwa Ibom State, Nigeria
                        </p>
</div>
<div class="flex gap-2">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface active:bg-surface-variant transition-colors">
<span class="material-symbols-outlined">share</span>
</button>
</div>
</div>
<!-- Quick Action Grid -->
<div class="grid grid-cols-3 gap-3 mb-8">
<button class="flex flex-col items-center justify-center gap-2 p-4 bg-primary rounded-2xl text-white active:bg-primary/90 transition-all">
<span class="material-symbols-outlined">directions</span>
<span class="font-label-md">Directions</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-4 bg-surface-container-highest rounded-2xl text-primary active:bg-surface-variant transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
<span class="font-label-md text-on-surface">Start</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-4 bg-surface-container-highest rounded-2xl text-primary active:bg-surface-variant transition-all">
<span class="material-symbols-outlined">save</span>
<span class="font-label-md text-on-surface">Save</span>
</button>
</div>
<!-- AI Quick Insights -->
<div class="p-4 bg-on-surface text-surface rounded-3xl mb-4">
<div class="flex items-center gap-3 mb-3">

<span class="font-title-lg text-secondary-fixed">Parcel Insight</span>
</div>
<p class="font-body-md text-surface/80 leading-relaxed">
                        Topography suggests high commercial viability for this zone. Recent zoning changes favor mixed-use developments. Click <span class="text-secondary-fixed font-bold">Analyse</span> for full report.
                    </p>
</div>
</div>
</div>
</div>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 w-full z-50 h-bottom-nav-height bg-surface border-t border-outline-variant/30 flex justify-around items-center px-gutter pb-safe">
<button class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-5 py-1 transition-transform active:scale-90">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-label-md">Map</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high rounded-full p-2 transition-transform active:scale-90">
<span class="material-symbols-outlined">analytics</span>
<span class="font-label-md">Analyse</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high rounded-full p-2 transition-transform active:scale-90">
<span class="material-symbols-outlined">description</span>
<span class="font-label-md">Report</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high rounded-full p-2 transition-transform active:scale-90">
<span class="material-symbols-outlined">history</span>
<span class="font-label-md">History</span>
</button>
</nav>
<script>
        const bottomSheet = document.getElementById('bottomSheet').firstElementChild;
        let isExpanded = false;

        bottomSheet.addEventListener('click', () => {
            if (!isExpanded) {
                bottomSheet.classList.add('scale-[1.01]');
                setTimeout(() => bottomSheet.classList.remove('scale-[1.01]'), 200);
            }
        });

        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => {
                btn.style.opacity = '0.8';
            });
            btn.addEventListener('touchend', () => {
                btn.style.opacity = '1';
            });
        });
    </script>
</body></html>
